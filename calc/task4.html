<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>Задание 4: Тир</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Задание 4: Тир</h1>

        <div class="criteria">
            <h3>Критерии оценивания (MAX: 7.0)</h3>
            <ul>
                <li>Считается среднее арифметическое очков всех участников (макс. 70)</li>
                <li>Формула: (среднее / 70) × 7</li>
                <li>
                    Примеры:
                    <ul>
                        <li>Среднее 70 → 7.0 баллов</li>
                        <li>Среднее 35 → 3.5 балла</li>
                        <li>Среднее 50 → 5.0 балла</li>
                    </ul>
                </li>
            </ul>
        </div>

        <div class="input-group">
            <label for="count-select">Количество участников:</label>
            <select id="count-select">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4" selected>4</option>
            </select>
        </div>

        <div id="scores-container"></div>

        <div class="score-display" id="score-display">
            Текущий балл: 0.0 / 7.0
        </div>

        <a href="index.html" class="btn btn-secondary back-btn">← Назад на главную</a>
    </div>

    <script>
        const TASK_ID = 'task4';
        const MAX_SCORE = 7.0;
        const MAX_RAW_SCORE = 70; // Новый максимум

        function loadScores() {
            const stored = sessionStorage.getItem('quest_calc_v1');
            return stored ? JSON.parse(stored) : {};
        }

        function saveScores(scores) {
            sessionStorage.setItem('quest_calc_v1', JSON.stringify(scores));
        }

        function createScoreInputs(count) {
            const container = document.getElementById('scores-container');
            container.innerHTML = '';

            const scores = loadScores();
            const savedScores = scores[TASK_ID]?.raw?.scores || [];

            for (let i = 0; i < count; i++) {
                const div = document.createElement('div');
                div.className = 'input-group';
                div.innerHTML = `
                        <label for="score-${i}">Очки участника ${i + 1} (0-${MAX_RAW_SCORE}):</label>
                        <input type="number" id="score-${i}" min="0" max="${MAX_RAW_SCORE}" placeholder="0" value="${savedScores[i] || ''}">
                    `;
                container.appendChild(div);
            }

            for (let i = 0; i < count; i++) {
                document.getElementById(`score-${i}`).addEventListener('input', updateUI);
            }
        }

        function calculateScore(count, scores) {
            if (count === 0 || scores.length === 0) return 0;

            const sum = scores.reduce((acc, val) => acc + (parseFloat(val) || 0), 0);
            let avg = sum / count;

            // Жёсткий кап на 70
            if (avg > MAX_RAW_SCORE) avg = MAX_RAW_SCORE;

            const score = (avg / MAX_RAW_SCORE) * 7;

            // Округление до 0.1
            return Math.round(score * 10) / 10;
        }

        function updateUI() {
            const countSelect = document.getElementById('count-select');
            const display = document.getElementById('score-display');

            const count = parseInt(countSelect.value);
            const scores = [];

            for (let i = 0; i < count; i++) {
                const input = document.getElementById(`score-${i}`);
                let val = parseFloat(input.value);
                if (isNaN(val) || val < 0) val = 0;
                if (val > MAX_RAW_SCORE) val = MAX_RAW_SCORE; // Защита от ввода > 70
                scores.push(val);
            }

            const score = calculateScore(count, scores);

            display.textContent = `Текущий балл: ${score.toFixed(1)} / ${MAX_SCORE}`;

            const allScores = loadScores();
            allScores[TASK_ID] = {
                score: score,
                raw: {
                    count: count,
                    scores: scores
                }
            };
            saveScores(allScores);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const countSelect = document.getElementById('count-select');
            const scores = loadScores();

            if (scores[TASK_ID] && scores[TASK_ID].raw && scores[TASK_ID].raw.count) {
                countSelect.value = scores[TASK_ID].raw.count;
            }

            createScoreInputs(parseInt(countSelect.value));
            updateUI();

            countSelect.addEventListener('change', () => {
                createScoreInputs(parseInt(countSelect.value));
                updateUI();
            });
        });
    </script>
</body>
</html>
