<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>Задание 6: Порадовать нас</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Специфичные стили только для этого задания */
        .toggle-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .toggle-btn {
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            border: 2px solid var(--input-border);
            background: var(--input-bg);
            color: var(--text-main);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

            .toggle-btn.active {
                background: var(--btn-bg);
                color: white;
                border-color: var(--btn-bg);
                transform: scale(1.02);
            }

            .toggle-btn:not(.active) {
                opacity: 0.6;
            }

            .toggle-btn:active {
                transform: scale(0.98);
            }
    </style>
</head>
<body>
    <div class="container">
        <h1>Задание 6: Порадовать нас</h1>

        <div class="criteria">
            <h3>Критерии оценивания (MAX: 2.0)</h3>
            <ul>
                <li>Порадовал хорошо: 2.0 балла</li>
                <li>Порадовал недостаточно хорошо: 1.0 балл</li>
                <li>Вообще не порадовал: 0.0 баллов</li>
            </ul>
        </div>

        <div class="toggle-group">
            <button class="toggle-btn" data-score="2">🔥 Порадовал хорошо (2.0)</button>
            <button class="toggle-btn" data-score="1">😐 Порадовал недостаточно хорошо (1.0)</button>
            <button class="toggle-btn" data-score="0">💀 Вообще не порадовал (0.0)</button>
        </div>

        <div class="score-display" id="score-display">
            Текущий балл: 0.0 / 2.0
        </div>

        <a href="index.html" class="btn btn-secondary back-btn">← Назад на главную</a>
    </div>

    <script>
        const TASK_ID = 'task6';
        const MAX_SCORE = 2.0;

        function loadScores() {
            const stored = sessionStorage.getItem('quest_calc_v1');
            return stored ? JSON.parse(stored) : {};
        }

        function saveScores(scores) {
            sessionStorage.setItem('quest_calc_v1', JSON.stringify(scores));
        }

        function updateUI(selectedScore) {
            const display = document.getElementById('score-display');
            const buttons = document.querySelectorAll('.toggle-btn');

            // Обновляем визуальное состояние кнопок
            buttons.forEach(btn => {
                const btnScore = parseFloat(btn.dataset.score);
                if (btnScore === selectedScore) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            display.textContent = `Текущий балл: ${selectedScore.toFixed(1)} / ${MAX_SCORE}`;

            // Сохраняем в sessionStorage
            const scores = loadScores();
            scores[TASK_ID] = {
                score: selectedScore,
                raw: { score: selectedScore }
            };
            saveScores(scores);
        }

        // Инициализация при загрузке
        document.addEventListener('DOMContentLoaded', () => {
            const buttons = document.querySelectorAll('.toggle-btn');
            const scores = loadScores();

            // Восстанавливаем сохраненное значение (по умолчанию 0)
            let currentScore = 0;
            if (scores[TASK_ID] && scores[TASK_ID].raw) {
                currentScore = scores[TASK_ID].raw.score;
            }

            updateUI(currentScore);

            // Слушаем клики по кнопкам
            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    const score = parseFloat(btn.dataset.score);
                    updateUI(score);
                });
            });
        });
    </script>
</body>
</html>
