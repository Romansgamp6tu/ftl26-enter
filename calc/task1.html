<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>Задание 1: Мишень</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Задание 1: Мишень</h1>

        <div class="criteria">
            <h3>Критерии оценивания (MAX: 3.0)</h3>
            <ul>
                <li>Нашли 6 фигур: 3.0 балла</li>
                <li>Нашли 5 фигур: 2.0 балла</li>
                <li>Нашли 4 фигуры: 1.0 балл</li>
                <li>Меньше 4 фигур: 0.0 баллов</li>
            </ul>
        </div>

        <div class="input-group">
            <label for="count-input">Количество найденных фигур (0-6):</label>
            <input type="number" id="count-input" min="0" max="6" placeholder="Введите число">
        </div>

        <div class="score-display" id="score-display">
            Текущий балл: 0.0 / 3.0
        </div>

        <a href="index.html" class="btn btn-secondary back-btn">← Назад на главную</a>
    </div>

    <script>
        const TASK_ID = 'task1';
        const MAX_SCORE = 3.0;

        function loadScores() {
            const stored = sessionStorage.getItem('quest_calc_v1');
            return stored ? JSON.parse(stored) : {};
        }

        function saveScores(scores) {
            sessionStorage.setItem('quest_calc_v1', JSON.stringify(scores));
        }

        function calculateScore(count) {
            if (count >= 6) return 3.0;
            if (count === 5) return 2.0;
            if (count === 4) return 1.0;
            return 0.0;
        }

        function updateUI() {
            const input = document.getElementById('count-input');
            const display = document.getElementById('score-display');

            let count = parseInt(input.value);
            if (isNaN(count) || count < 0) count = 0;
            if (count > 6) count = 6; // Ограничиваем сверху

            const score = calculateScore(count);

            display.textContent = `Текущий балл: ${score.toFixed(1)} / ${MAX_SCORE}`;

            // Сохраняем в sessionStorage
            const scores = loadScores();
            scores[TASK_ID] = {
                score: score,
                raw: { count: count }
            };
            saveScores(scores);
        }
        // я лох
        // Инициализация при загрузке
        document.addEventListener('DOMContentLoaded', () => {
            const input = document.getElementById('count-input');
            const scores = loadScores();

            // Восстанавливаем сохраненное значение, если есть
            if (scores[TASK_ID] && scores[TASK_ID].raw) {
                input.value = scores[TASK_ID].raw.count;
            }

            updateUI();

            // Слушаем изменения ввода
            input.addEventListener('input', updateUI);
        });
    </script>
</body>
</html>
