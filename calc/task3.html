<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>Задание 3: Солнечный круг</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Задание 3: Солнечный круг</h1>

        <div class="criteria">
            <h3>Критерии оценивания (MAX: 3.0)</h3>
            <ul>
                <li>За каждые 10 секунд: +0.5 балла</li>
                <li>Максимум 1 минута (60 сек): 3.0 балла</li>
                <li>
                    Примеры:
                    <ul>
                        <li>20 сек → 1.0 балл</li>
                        <li>40 сек → 2.0 балла</li>
                        <li>60+ сек → 3.0 балла</li>
                    </ul>
                </li>
            </ul>
        </div>

        <div class="input-row">
            <div class="input-group">
                <label for="min-input">Минуты</label>
                <input type="number" id="min-input" min="0" max="1" placeholder="0">
            </div>
            <div class="input-group">
                <label for="sec-input">Секунды</label>
                <input type="number" id="sec-input" min="0" max="59" placeholder="0">
            </div>
        </div>

        <div class="score-display" id="score-display">
            Текущий балл: 0.0 / 3.0
        </div>

        <a href="index.html" class="btn btn-secondary back-btn">← Назад на главную</a>
    </div>

    <script>
        const TASK_ID = 'task3';
        const MAX_SCORE = 3.0;

        function loadScores() {
            const stored = sessionStorage.getItem('quest_calc_v1');
            return stored ? JSON.parse(stored) : {};
        }

        function saveScores(scores) {
            sessionStorage.setItem('quest_calc_v1', JSON.stringify(scores));
        }

        function calculateScore(min, sec) {
            const totalSec = (parseInt(min) || 0) * 60 + (parseInt(sec) || 0);

            // Формула: 0.5 балла за каждые 10 секунд
            let score = (totalSec / 10) * 0.5;

            // Не может быть больше 3.0
            if (score > 3.0) score = 3.0;
            if (score < 0) score = 0;

            // Округление до 0.5
            return Math.round(score * 2) / 2;
        }

        function updateUI() {
            const minInput = document.getElementById('min-input');
            const secInput = document.getElementById('sec-input');
            const display = document.getElementById('score-display');

            let min = parseInt(minInput.value);
            let sec = parseInt(secInput.value);

            if (isNaN(min) || min < 0) min = 0;
            if (min > 1) min = 1; // Максимум 1 минута
            if (isNaN(sec) || sec < 0) sec = 0;
            if (sec > 59) sec = 59;

            const score = calculateScore(min, sec);

            display.textContent = `Текущий балл: ${score.toFixed(1)} / ${MAX_SCORE}`;

            // Сохраняем в sessionStorage
            const scores = loadScores();
            scores[TASK_ID] = {
                score: score,
                raw: { min: min, sec: sec }
            };
            saveScores(scores);
        }

        // Инициализация при загрузке
        document.addEventListener('DOMContentLoaded', () => {
            const minInput = document.getElementById('min-input');
            const secInput = document.getElementById('sec-input');
            const scores = loadScores();

            // Восстанавливаем сохраненные значения
            if (scores[TASK_ID] && scores[TASK_ID].raw) {
                minInput.value = scores[TASK_ID].raw.min;
                secInput.value = scores[TASK_ID].raw.sec;
            }

            updateUI();

            // Слушаем изменения ввода
            minInput.addEventListener('input', updateUI);
            secInput.addEventListener('input', updateUI);
        });
    </script>
</body>
</html>
