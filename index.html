<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Квест</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }
        .container {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 { margin-top: 0; font-size: 22px; }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            font-size: 16px; 
            border: 2px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            margin-bottom: 12px;
            outline: none;
        }
        input[type="text"]:focus { border-color: #007bff; }
        button {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            background-color: #007bff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        button:active { background-color: #0056b3; }
        #stage-2 img {
            max-width: 100%;
            border-radius: 8px;
            margin-bottom: 16px;
        }
        .error {
            color: #dc3545;
            font-size: 14px;
            min-height: 20px;
            margin-bottom: 8px;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="stage-1" class="container">
        <h2 id="question-text"></h2>
        <p class="error" id="error-msg"></p>
        <input type="text" id="answer-input" placeholder="Твой ответ...">
        <button id="submit-btn">Ответить</button>
    </div>

    <div id="stage-2" class="container hidden">
        <img id="waiter-img" src="" alt="Waiter">
        <h2 id="waiter-text"></h2>
    </div>

    <script>
        // КОНСТАНТЫ
        const CONFIG = {
            QUESTION: "Чего совершенного есть в том зале?",
            VALID_ANSWERS: [
                "баскетбольное кольцо", 
                "кольцо", 
                "баскетбольные кольца", 
                "кольца"
            ],
            IMAGE_PATH: "waiter.jpg",
            WAITER_TEXT: "Место для текста ждуна (напиши его потом)."
        };

        document.addEventListener("DOMContentLoaded", () => {
            const stage1 = document.getElementById("stage-1");
            const stage2 = document.getElementById("stage-2");
            const questionText = document.getElementById("question-text");
            const input = document.getElementById("answer-input");
            const btn = document.getElementById("submit-btn");
            const errorMsg = document.getElementById("error-msg");
            const waiterImg = document.getElementById("waiter-img");
            const waiterText = document.getElementById("waiter-text");

            // Инициализация из конфига
            questionText.innerText = CONFIG.QUESTION;
            waiterImg.src = CONFIG.IMAGE_PATH;
            waiterText.innerText = CONFIG.WAITER_TEXT;

            // Нормализация строки
            const normalize = (str) => {
                return str.trim().toLowerCase().replace(/ё/g, "е");
            };

            const checkAnswer = () => {
                const userAnswer = normalize(input.value);
                if (!userAnswer) return;

                const isValid = CONFIG.VALID_ANSWERS.some(ans => userAnswer === normalize(ans));

                if (isValid) {
                    stage1.classList.add("hidden");
                    stage2.classList.remove("hidden");
                } else {
                    errorMsg.innerText = "Неверно! Подумай еще.";
                    input.value = "";
                }
            };

            btn.addEventListener("click", checkAnswer);
            input.addEventListener("keypress", (e) => {
                if (e.key === "Enter") checkAnswer();
            });
        });
    </script>
</body>
</html>
